name: Probe Media Sources

on:
  workflow_dispatch:
    inputs:
      pexels_url:
        description: 'Pexels video file URL'
        required: false
        default: 'https://videos.pexels.com/video-files/12336960/12336960-sd_426_228_30fps.mp4'
      pin_url:
        description: 'Pinterest pin/board URL'
        required: false
        default: 'https://pin.it/6yweXbZ0O'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -q requests yt-dlp
      - name: Probe
        env:
          YADISK_LOGIN:    ${{ secrets.YADISK_LOGIN }}
          YADISK_PASSWORD: ${{ secrets.YADISK_PASSWORD }}
          PEXELS_URL:      ${{ inputs.pexels_url }}
          PIN_URL:         ${{ inputs.pin_url }}
        run: python probe_media.py
