name: Probe VeoFree i2v

on:
  workflow_dispatch:
    inputs:
      img_remote:
        description: 'YaDisk path to input image'
        required: false
        default: 'Content factory/_probe_i2v_in/anchor.png'
      prompt:
        description: 'Motion prompt'
        required: false
        default: 'slow immersive sinking deeper into clear blue water, gentle light rays, subtle drift, no text, no people'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip install -q requests playwright
          python -m playwright install --with-deps chromium
      - name: Probe i2v
        env:
          YADISK_LOGIN:    ${{ secrets.YADISK_LOGIN }}
          YADISK_PASSWORD: ${{ secrets.YADISK_PASSWORD }}
          IMG_REMOTE:      ${{ inputs.img_remote }}
          PROMPT:          ${{ inputs.prompt }}
        run: python veofree_i2v_probe.py
