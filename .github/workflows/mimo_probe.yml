name: mimo probe (Phase 0 spike)

# Фаза 0 разнообразия-агента: проверка, что mimo (mimocode) запускается headless
# в GH Actions с восстановленным auth и УМЕЕТ ВИДЕТЬ картинку (роль «глаз+судья»).
# Бинарь + auth тянутся с приватной ЯД (Content factory/mimo_ci/), НЕ из секретов.
# Результат → TG тред 634. Джоб падает, если пробы не прошли. Изолирован: пул не трогает.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: sudo apt-get update -qq && sudo apt-get install -y --fix-missing rclone

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"

      - name: Restore mimo binary + auth from ydrive
        run: |
          set -e
          mkdir -p "$HOME/.mimocode/bin" "$HOME/.local/share/mimocode"
          rclone copyto "ydrive:Content factory/mimo_ci/mimo" "$HOME/.mimocode/bin/mimo"
          chmod +x "$HOME/.mimocode/bin/mimo"
          rclone copyto "ydrive:Content factory/mimo_ci/installation_id"   "$HOME/.local/share/mimocode/installation_id"
          rclone copyto "ydrive:Content factory/mimo_ci/mimo-free-client"  "$HOME/.local/share/mimocode/mimo-free-client"
          echo "mimo version:"; "$HOME/.mimocode/bin/mimo" --version || true

      - name: Probe — text + vision
        id: probe
        run: |
          MIMO="$HOME/.mimocode/bin/mimo"
          mkdir -p /tmp/mimorun && cd /tmp/mimorun
          strip() { sed -r 's/\x1B\[[0-9;]*[A-Za-z]//g'; }

          echo "::group::text probe"
          timeout 150 "$MIMO" run --pure --dangerously-skip-permissions \
            "Reply with exactly: PROBE_OK and nothing else." \
            > text_out.txt 2> text_err.txt || true
          strip < text_out.txt > text_clean.txt
          echo "--- text stdout ---"; cat text_clean.txt
          echo "::endgroup::"

          echo "::group::vision probe"
          timeout 200 "$MIMO" run --pure --dangerously-skip-permissions \
            "Describe this image in ONE short sentence: dominant colors, mood, brightness. Begin your reply with VISION_OK if you can actually see the picture." \
            -f "$GITHUB_WORKSPACE/style_scout_testframe.jpg" \
            > vis_out.txt 2> vis_err.txt || true
          strip < vis_out.txt > vis_clean.txt
          echo "--- vision stdout ---"; cat vis_clean.txt
          echo "::endgroup::"

          TEXT=$(cat text_clean.txt); VIS=$(cat vis_clean.txt)
          PASS=1
          echo "$TEXT" | grep -q "PROBE_OK"  || { echo "TEXT PROBE FAILED";  PASS=0; }
          echo "$VIS"  | grep -q "VISION_OK" || { echo "VISION PROBE FAILED"; PASS=0; }

          {
            echo "MIMO_PASS=$PASS"
            echo "MIMO_TEXT<<EOF"; echo "$TEXT" | head -c 300; echo; echo "EOF"
            echo "MIMO_VIS<<EOF";  echo "$VIS"  | head -c 500; echo; echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Report to Telegram (thread 634)
        if: always()
        env:
          WORKER: ${{ secrets.CLOUDFLARE_WORKER }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.SCOUT_CHAT_ID }}
        run: |
          STATUS="✅ PASS"; [ "${MIMO_PASS:-0}" = "1" ] || STATUS="❌ FAIL"
          MSG="mimo probe (Phase 0) — $STATUS
          text: ${MIMO_TEXT:-<нет>}
          vision: ${MIMO_VIS:-<нет>}"
          if [ -n "$WORKER" ] && [ -n "$TG_TOKEN" ] && [ -n "$CHAT" ]; then
            curl -sf -m 60 "$WORKER/bot$TG_TOKEN/sendMessage" \
              -d "chat_id=$CHAT" -d "message_thread_id=634" \
              --data-urlencode "text=$MSG" >/dev/null && echo "tg sent" || echo "tg send failed"
          else
            echo "tg secrets missing — skip"
          fi

      - name: Fail if probes did not pass
        if: always()
        run: test "${MIMO_PASS:-0}" = "1"
