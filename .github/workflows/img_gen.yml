name: Image Gen (CF Workers AI)

on:
  workflow_dispatch: {}

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -q requests

      - name: Generate test images
        env:
          IMG_WORKER_URL: https://yaromat-img.mat3213.workers.dev
          IMG_WORKER_SECRET: ${{ secrets.IMG_WORKER_SECRET }}
        run: |
          PROMPT="deserted concrete courtyard of a khrushchyovka block at 3am, single lamp post, flat overcast sky, eye-level, Kodak Portra 400 film grain, cold desaturated blue-grey, cinematic melancholy, 35mm analog feel, fog, no people"
          NEG="oversaturated, plastic, glossy, HDR, bright, cheerful, commercial, CGI, 3D render, faces, text, watermark"
          python gen_cf_image.py --model flux --out flux.jpg --prompt "$PROMPT"
          python gen_cf_image.py --model sdxl --out sdxl.png --width 1280 --height 720 --steps 20 --negative "$NEG" --prompt "$PROMPT"

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: images
          path: |
            flux.jpg
            sdxl.png
