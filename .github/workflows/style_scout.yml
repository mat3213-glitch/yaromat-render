name: Style Scout

on:
  schedule:
    - cron: "0 11 * * 1"   # понедельник 11:00 UTC (GH schedule может задерживать)
  workflow_dispatch:
    inputs:
      per_query:
        description: "кадров на запрос"
        default: "3"
      limit:
        description: "макс кандидатов после дедупа"
        default: "6"

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing ffmpeg rclone

      - name: Install python deps
        run: pip install -q numpy pillow requests

      - name: Configure rclone ydrive
        env:
          YDRIVE_CLIENT_ID:     ${{ secrets.YDRIVE_CLIENT_ID }}
          YDRIVE_CLIENT_SECRET: ${{ secrets.YDRIVE_CLIENT_SECRET }}
          YDRIVE_TOKEN:         ${{ secrets.YDRIVE_TOKEN }}
        run: |
          mkdir -p "$HOME/.config/rclone"
          printf '[ydrive]\ntype = yandex\nclient_id = %s\nclient_secret = %s\ntoken = %s\n' \
            "$YDRIVE_CLIENT_ID" "$YDRIVE_CLIENT_SECRET" "$YDRIVE_TOKEN" \
            > "$HOME/.config/rclone/rclone.conf"

      - name: Run style scout
        env:
          CLOUDFLARE_WORKER:     ${{ secrets.CLOUDFLARE_WORKER }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          STYLE_SCOUT_CHAT_ID:   ${{ secrets.SCOUT_CHAT_ID }}   # та же группа @yaromat
          STYLE_SCOUT_THREAD_ID: "634"                          # тема «STYLE SCOUT»
        run: python style_scout.py --per-query "${{ github.event.inputs.per_query || '3' }}" --limit "${{ github.event.inputs.limit || '6' }}"

      # ── Фаза 1: mimo как глаз+судья (dedicated free-личность с ЯД, отдельно от бука) ──
      - name: Restore mimo (binary + CI auth from ydrive)
        run: |
          set -e
          mkdir -p "$HOME/.mimocode/bin" "$HOME/.local/share/mimocode"
          rclone copyto "ydrive:Content factory/mimo_ci/mimo" "$HOME/.mimocode/bin/mimo"
          chmod +x "$HOME/.mimocode/bin/mimo"
          rclone copyto "ydrive:Content factory/mimo_ci/installation_id"  "$HOME/.local/share/mimocode/installation_id"
          rclone copyto "ydrive:Content factory/mimo_ci/mimo-free-client" "$HOME/.local/share/mimocode/mimo-free-client"

      - name: Judge candidates (mimo)
        env:
          CLOUDFLARE_WORKER:     ${{ secrets.CLOUDFLARE_WORKER }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          STYLE_SCOUT_CHAT_ID:   ${{ secrets.SCOUT_CHAT_ID }}
          STYLE_SCOUT_THREAD_ID: "634"
        run: python style_judge.py   # MIMO_BIN дефолтит на ~/.mimocode/bin/mimo; best-effort, мердж за yaromat

      - name: Commit proposals + judge
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add style_proposals.json
          [ -f style_judge.json ] && git add style_judge.json || echo "no judge output"
          if git diff --cached --quiet; then
            echo "no proposals change"
          else
            git commit -m "style-scout: new candidates + mimo judge [skip ci]"
            git push
          fi
