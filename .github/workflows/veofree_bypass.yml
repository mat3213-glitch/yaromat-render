name: Probe VeoFree Bypass

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip install -q requests playwright
          python -m playwright install --with-deps chromium
      - name: Probe bypass
        env:
          YADISK_LOGIN:    ${{ secrets.YADISK_LOGIN }}
          YADISK_PASSWORD: ${{ secrets.YADISK_PASSWORD }}
        run: python veofree_bypass_probe.py
