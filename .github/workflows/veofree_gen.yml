name: VeoFree Generate (1 per run)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Text-to-video prompt'
        required: true
      dest_folder:
        description: 'ЯД destination folder'
        required: true
      out_name:
        description: 'Output mp4 name (e.g. clip_01.mp4)'
        required: true

jobs:
  gen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip install -q requests playwright
          python -m playwright install --with-deps chromium
      - name: Generate
        env:
          YADISK_LOGIN:    ${{ secrets.YADISK_LOGIN }}
          YADISK_PASSWORD: ${{ secrets.YADISK_PASSWORD }}
          PROMPT:          ${{ inputs.prompt }}
          DEST_FOLDER:     ${{ inputs.dest_folder }}
          OUT_NAME:        ${{ inputs.out_name }}
        run: python veofree_gen.py
