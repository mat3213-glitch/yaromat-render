name: Probe VeoFree Limit

on:
  workflow_dispatch:
    inputs:
      max_gens:
        description: 'Max generations to attempt in one session'
        required: false
        default: '8'
      delay_s:
        description: 'Delay between generations (sec) — be gentle on IP'
        required: false
        default: '12'

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip install -q requests playwright
          python -m playwright install --with-deps chromium
      - name: Probe limit
        env:
          YADISK_LOGIN:    ${{ secrets.YADISK_LOGIN }}
          YADISK_PASSWORD: ${{ secrets.YADISK_PASSWORD }}
          MAX_GENS:        ${{ inputs.max_gens }}
          DELAY_S:         ${{ inputs.delay_s }}
        run: python veofree_limit_probe.py
